<template>
    <template if:true={showModal}>
        <div class="at-overlay" onclick={handleOverlayClick}></div>
        <div class="at-modal-panel">
            <div class="at-modal-header">
                <button class="at-modal-close" onclick={closeModal} title="Cerrar" aria-label="Cerrar"><lightning-icon icon-name="utility:close" size="small" alternative-text="Cerrar"></lightning-icon></button>
                <span class="at-modal-title">Nuevo Afianzado</span>
                <span class="at-modal-object-badge">Account</span>
            </div>
            <div class="at-modal-body">
                <template if:true={isLoading}><div class="at-modal-loading"><lightning-spinner alternative-text="Guardando..." size="small"></lightning-spinner></div></template>
                <lightning-record-edit-form object-api-name="Account" onsubmit={handleSubmit}>
                    <div class="at-modal-fields">
                        <template for:each={fields} for:item="f">
                            <div key={f.apiName} class="at-modal-field-row">
                                <div class="at-modal-field-label">
                                    <lightning-icon icon-name={f.typeIcon} size="xx-small" alternative-text={f.label} class="at-modal-field-icon"></lightning-icon>
                                    <span>{f.label}</span>
                                </div>
                                <div class="at-modal-field-input">
                                    <template if:true={f.isFianza}>
                                        <c-tech-multi-lookup label="" object-api-name="Fianza__c" onselectionchange={handleFianzaChange} oncreatenew={handleQuickCreate}></c-tech-multi-lookup>
                                    </template>
                                    <template if:false={f.isSpecial}>
                                        <lightning-input-field field-name={f.apiName} variant="label-hidden"></lightning-input-field>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                    <div class="at-modal-footer">
                        <lightning-button label="Cancelar" onclick={closeModal} disabled={isLoading}></lightning-button>
                        <lightning-button type="submit" label="Guardar" variant="brand" disabled={isLoading}></lightning-button>
                    </div>
                </lightning-record-edit-form>
            </div>
        </div>
    </template>
</template>
