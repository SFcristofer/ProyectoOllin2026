<template>
    <template if:true={showModal}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Cerrar" onclick={closeModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse" size="small"></lightning-icon>
                    </button>
                    <h2 class="slds-text-heading_medium">Nuevo Afianzado - Estilo Airtable</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <template if:true={isLoading}>
                        <lightning-spinner alternative-text="Guardando..." size="medium"></lightning-spinner>
                    </template>
                    <lightning-record-edit-form object-api-name="Account" onsubmit={handleSubmit}>
                        <div class="slds-grid slds-wrap slds-gutters">
                            <template for:each={fields} for:item="f">
                                <div key={f.apiName} class="slds-col slds-size_1-of-2">
                                    <template if:true={f.isFianza}>
                                        <div class="slds-m-bottom_small">
                                            <c-tech-multi-lookup label={f.label} object-api-name="Fianza__c" onselectionchange={handleFianzaChange} oncreatenew={handleQuickCreate}></c-tech-multi-lookup>
                                        </div>
                                    </template>
                                    <template if:false={f.isSpecial}>
                                        <lightning-input-field field-name={f.apiName}></lightning-input-field>
                                    </template>
                                </div>
                            </template>
                        </div>
                        <div class="slds-m-top_medium slds-text-align_right">
                            <lightning-button label="Cancelar" onclick={closeModal} class="slds-m-right_small" disabled={isLoading}></lightning-button>
                            <lightning-button type="submit" label="Guardar Registro" variant="brand" disabled={isLoading}></lightning-button>
                        </div>
                    </lightning-record-edit-form>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
