<template>
    <div class="at-container">
        <template if:true={isLoading}>
            <div class="at-loading-overlay"><lightning-spinner alternative-text="Cargando..." size="small"></lightning-spinner></div>
        </template>

        <div class="at-views-bar">
            <div class="at-views-list">
                <button class={gridTabClass}    data-view="grid"    onclick={handleViewChange}><lightning-icon icon-name="utility:table"  size="xx-small" class="at-tab-icon" alternative-text="Grid"></lightning-icon>Grid</button>
                <button class={galleryTabClass} data-view="gallery" onclick={handleViewChange}><lightning-icon icon-name="utility:image"  size="xx-small" class="at-tab-icon" alternative-text="Gallery"></lightning-icon>Gallery</button>
                <button class={kanbanTabClass}  data-view="kanban"  onclick={handleViewChange}><lightning-icon icon-name="utility:kanban" size="xx-small" class="at-tab-icon" alternative-text="Kanban"></lightning-icon>Kanban</button>
                <button class="at-add-view-btn">+ Agregar vista</button>
            </div>
        </div>

        <div class="at-toolbar">
            <div class="at-toolbar-right">
                <lightning-input type="search" variant="label-hidden" placeholder="Buscar..." class="at-search" onchange={handleSearch}></lightning-input>
                <lightning-button label="Nueva Comisión" variant="brand" icon-name="utility:add" class="slds-m-left_small" onclick={handleOpenCreateModal}></lightning-button>
            </div>
        </div>

        <!-- GRID VIEW -->
        <template if:true={isGridView}>
            <div class="at-grid-wrapper">
                <table class="at-table">
                    <thead>
                        <tr>
                            <th class="at-th at-th-rownum"></th>
                            <th class="at-th at-th-sticky at-th-sortable" data-field="name" onclick={handleSort}><span class="at-field-icon"><lightning-icon icon-name="utility:text" size="xx-small" alternative-text="Nombre"></lightning-icon></span>Nombre{nameSortArrow}</th>
                            <template for:each={visibleColumnsWithSort} for:item="col">
                                <th key={col.field} class={col.thClass} style={col.minWidthStyle} data-field={col.field} onclick={handleSort}><span class="at-field-icon"><lightning-icon icon-name={col.icon} size="xx-small" alternative-text={col.label}></lightning-icon></span>{col.label}{col.sortArrow}</th>
                            </template>
                            <th class="at-th at-th-addfield" onclick={handleToggleColumnPicker}>
                                <template if:false={showColumnPicker}><span class="at-add-field-label">+ Campo</span></template>
                                <template if:true={showColumnPicker}>
                                    <div class="at-column-picker" onclick={stopPropagation}>
                                        <div class="at-picker-header">Agregar campo</div>
                                        <template for:each={availableColumns} for:item="col">
                                            <div key={col.field} class="at-picker-item" data-field={col.field} onclick={handleSelectColumn}><span class="at-field-icon"><lightning-icon icon-name={col.icon} size="xx-small" alternative-text={col.label}></lightning-icon></span>{col.label}</div>
                                        </template>
                                        <template if:false={hasAvailableColumns}><div class="at-picker-empty">No hay más campos</div></template>
                                    </div>
                                </template>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={filteredData} for:item="item">
                            <tr key={item.id} class="at-tr" data-id={item.id}>
                                <td class="at-td at-td-rownum">
                                    <span class="at-row-num">{item.rowNumber}</span>
                                    <button class="at-expand-btn" data-id={item.id} onclick={handleExpandRow} title="Expandir"><lightning-icon icon-name="utility:expand_alt" size="xx-small" alternative-text="Expandir"></lightning-icon></button>
                                </td>
                                <td class="at-td at-td-sticky" data-id={item.id} data-field="name" onclick={handleCellClick}>
                                    <template if:true={item.isEditingName}><input class="at-inline-input" type="text" value={item.name} data-id={item.id} data-field="name" onblur={handleCellBlur} onkeydown={handleCellKeydown}/></template>
                                    <template if:false={item.isEditingName}><span class="at-cell-text">{item.name}</span></template>
                                </td>
                                <template for:each={visibleColumns} for:item="col">
                                    <td key={col.field} class="at-td" data-id={item.id} data-field={col.field} onclick={handleCellClick}>
                                        <template if:true={col.isFianza}><span class="at-chip at-chip-blue">{item.fianza}</span></template>
                                        <template if:true={col.isVendedor}><span class="at-chip at-chip-purple">{item.vendedor}</span></template>
                                        <template if:true={col.isEstatus}><span class={item.estatusClass}>{item.estatus}</span></template>
                                        <template if:true={col.isPct}><span class="at-cell-text">{item.pctAplicado}%</span></template>
                                        <template if:true={col.isMontoO}><span class="at-cell-text">{item.montoOllinFmt}</span></template>
                                        <template if:true={col.isMontoV}><span class="at-cell-text">{item.montoVendedorFmt}</span></template>
                                        <template if:true={col.isSeguro}><span class="at-chip at-chip-teal">{item.seguro}</span></template>
                                        <template if:true={col.isTabla}><span class="at-cell-text">{item.tablaComision}</span></template>
                                    </td>
                                </template>
                                <td class="at-td at-td-filler"></td>
                            </tr>
                        </template>
                        <tr class="at-tr-addrow" onclick={handleOpenCreateModal}><td colspan="99" class="at-td-addrow"><span class="at-addrow-label">+ Agregar registro</span></td></tr>
                    </tbody>
                </table>
            </div>
        </template>

        <!-- GALLERY VIEW -->
        <template if:true={isGalleryView}>
            <div class="at-gallery">
                <template for:each={filteredData} for:item="item">
                    <div key={item.id} class="at-gallery-card" data-id={item.id} onclick={handleExpandRow}>
                        <div class="at-gallery-card-top"><span class={item.estatusClass}>{item.estatus}</span></div>
                        <div class="at-gallery-title">{item.name}</div>
                        <div class="at-gallery-field"><span class="at-gallery-label">Fianza</span><span class="at-chip at-chip-blue">{item.fianza}</span></div>
                        <div class="at-gallery-field"><span class="at-gallery-label">Vendedor</span><span class="at-chip at-chip-purple">{item.vendedor}</span></div>
                        <div class="at-gallery-field"><span class="at-gallery-label">Monto Ollin</span><span>{item.montoOllinFmt}</span></div>
                    </div>
                </template>
                <div class="at-gallery-add" onclick={handleOpenCreateModal}><span class="at-gallery-add-icon">+</span><span>Nuevo registro</span></div>
            </div>
        </template>

        <!-- KANBAN VIEW -->
        <template if:true={isKanbanView}>
            <div class="at-kanban">
                <template for:each={kanbanColumns} for:item="col">
                    <div key={col.status} class="at-kanban-col">
                        <div class="at-kanban-col-header"><span class={col.badgeClass}>{col.status}</span><span class="at-kanban-count">{col.count}</span></div>
                        <div class="at-kanban-cards">
                            <template for:each={col.items} for:item="item">
                                <div key={item.id} class="at-kanban-card" data-id={item.id} onclick={handleExpandRow}>
                                    <div class="at-kanban-card-name">{item.name}</div>
                                    <div class="at-kanban-card-meta">{item.montoOllinFmt}</div>
                                </div>
                            </template>
                            <button class="at-kanban-add-btn" onclick={handleOpenCreateModal}>+ Agregar</button>
                        </div>
                    </div>
                </template>
            </div>
        </template>
    </div>

    <!-- DETAIL PANEL -->
    <template if:true={isDetailPanelOpen}>
        <div class="at-overlay" onclick={handleCloseDetailPanel}></div>
        <div class="at-detail-panel">
            <div class="at-detail-header">
                <div class="at-detail-nav">
                    <button class="at-detail-nav-btn" onclick={handlePrevRecord} disabled={isFirstRecord} title="Anterior">▲</button>
                    <button class="at-detail-nav-btn" onclick={handleNextRecord} disabled={isLastRecord}  title="Siguiente">▼</button>
                </div>
                <div class="at-detail-header-info">
                    <span class="at-detail-title">{selectedItem.name}</span>
                    <span class="at-detail-subtitle">Comisión</span>
                </div>
                <div class="at-detail-header-actions">
                    <template if:false={isEditingPanel}>
                        <lightning-button label="Editar" icon-name="utility:edit" size="small" variant="neutral" onclick={handleEditFromPanel}></lightning-button>
                    </template>
                    <template if:true={isEditingPanel}>
                        <span class="at-panel-editing-badge">Editando...</span>
                    </template>
                    <button class="at-detail-close" onclick={handleCloseDetailPanel} title="Cerrar"><lightning-icon icon-name="utility:close" size="small" alternative-text="Cerrar"></lightning-icon></button>
                </div>
            </div>
            <div class="at-detail-body">
                <template if:true={selectedItem}>
                    <template if:false={isEditingPanel}>
                        <lightning-record-view-form record-id={selectedItem.id} object-api-name="Tech_Comision__c">
                            <div class="at-detail-fields">
                                <div class="at-detail-field-row"><span class="at-detail-field-label"><span class="at-ftype at-ftype-text">A</span>Nombre</span><lightning-output-field field-name="Name" variant="label-hidden"></lightning-output-field></div>
                                <div class="at-detail-field-row"><span class="at-detail-field-label"><span class="at-ftype at-ftype-ref">≡</span>Fianza</span><lightning-output-field field-name="Fianza__c" variant="label-hidden"></lightning-output-field></div>
                                <div class="at-detail-field-row"><span class="at-detail-field-label"><span class="at-ftype at-ftype-ref">≡</span>Vendedor</span><lightning-output-field field-name="Vendedor__c" variant="label-hidden"></lightning-output-field></div>
                                <div class="at-detail-field-row"><span class="at-detail-field-label"><span class="at-ftype at-ftype-ref">≡</span>Seguro</span><lightning-output-field field-name="Seguro__c" variant="label-hidden"></lightning-output-field></div>
                                <div class="at-detail-field-row"><span class="at-detail-field-label"><span class="at-ftype at-ftype-ref">≡</span>Tabla Comisión</span><lightning-output-field field-name="Tabla_Comision__c" variant="label-hidden"></lightning-output-field></div>
                                <div class="at-detail-field-row"><span class="at-detail-field-label"><span class="at-ftype at-ftype-list">▼</span>Estatus</span><lightning-output-field field-name="Estatus__c" variant="label-hidden"></lightning-output-field></div>
                                <div class="at-detail-field-row"><span class="at-detail-field-label"><span class="at-ftype at-ftype-formula">%</span>% Aplicado</span><lightning-output-field field-name="Pct_Aplicado__c" variant="label-hidden"></lightning-output-field></div>
                                <div class="at-detail-field-row"><span class="at-detail-field-label"><span class="at-ftype at-ftype-currency">$</span>Monto Ollin</span><lightning-output-field field-name="Monto_Ollin__c" variant="label-hidden"></lightning-output-field></div>
                                <div class="at-detail-field-row"><span class="at-detail-field-label"><span class="at-ftype at-ftype-currency">$</span>Monto Vendedor</span><lightning-output-field field-name="Monto_Vendedor__c" variant="label-hidden"></lightning-output-field></div>
                            </div>
                        </lightning-record-view-form>
                    </template>
                    <template if:true={isEditingPanel}>
                        <lightning-record-edit-form record-id={selectedItem.id} object-api-name="Tech_Comision__c" onsuccess={handlePanelSaveSuccess}>
                            <div class="at-detail-fields at-detail-fields-edit">
                                <div class="at-detail-field-row"><span class="at-detail-field-label"><span class="at-ftype at-ftype-ref">≡</span>Fianza</span><lightning-input-field field-name="Fianza__c" variant="label-hidden"></lightning-input-field></div>
                                <div class="at-detail-field-row"><span class="at-detail-field-label"><span class="at-ftype at-ftype-ref">≡</span>Vendedor</span><lightning-input-field field-name="Vendedor__c" variant="label-hidden"></lightning-input-field></div>
                                <div class="at-detail-field-row"><span class="at-detail-field-label"><span class="at-ftype at-ftype-ref">≡</span>Seguro</span><lightning-input-field field-name="Seguro__c" variant="label-hidden"></lightning-input-field></div>
                                <div class="at-detail-field-row"><span class="at-detail-field-label"><span class="at-ftype at-ftype-ref">≡</span>Tabla Comisión</span><lightning-input-field field-name="Tabla_Comision__c" variant="label-hidden"></lightning-input-field></div>
                                <div class="at-detail-field-row"><span class="at-detail-field-label"><span class="at-ftype at-ftype-list">▼</span>Estatus</span><lightning-input-field field-name="Estatus__c" variant="label-hidden"></lightning-input-field></div>
                                <div class="at-detail-field-row"><span class="at-detail-field-label"><span class="at-ftype at-ftype-formula">%</span>% Aplicado</span><lightning-input-field field-name="Pct_Aplicado__c" variant="label-hidden"></lightning-input-field></div>
                                <div class="at-detail-field-row"><span class="at-detail-field-label"><span class="at-ftype at-ftype-currency">$</span>Monto Ollin</span><lightning-input-field field-name="Monto_Ollin__c" variant="label-hidden"></lightning-input-field></div>
                                <div class="at-detail-field-row"><span class="at-detail-field-label"><span class="at-ftype at-ftype-currency">$</span>Monto Vendedor</span><lightning-input-field field-name="Monto_Vendedor__c" variant="label-hidden"></lightning-input-field></div>
                            </div>
                            <div class="at-panel-edit-actions">
                                <button class="at-panel-btn at-panel-btn-cancel" type="button" onclick={handlePanelCancel}>Cancelar</button>
                                <button class="at-panel-btn at-panel-btn-save"   type="submit">Guardar cambios</button>
                            </div>
                        </lightning-record-edit-form>
                    </template>
                </template>
            </div>
        </div>
    </template>

    <c-tech-comision-create-modal show-modal={isCreateModalOpen} onclose={handleCloseCreateModal} onsuccess={handleCreateSuccess}></c-tech-comision-create-modal>
</template>
