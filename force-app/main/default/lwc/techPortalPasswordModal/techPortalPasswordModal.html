<template>
    <template if:true={showModal}>
        <div class="ppm-backdrop" onclick={handleBackdropClick}></div>
        <div class="ppm-modal">

            <div class="ppm-header">
                <div class="ppm-header-icon">🔐</div>
                <div>
                    <div class="ppm-header-title">Verificar identidad</div>
                    <div class="ppm-header-sub">{portalName}</div>
                </div>
                <button class="ppm-close" onclick={handleClose} title="Cerrar">×</button>
            </div>

            <div class="ppm-body">

                <template if:false={revealed}>
                    <p class="ppm-desc">
                        Ingresa las credenciales maestras de Ollin para continuar.
                    </p>

                    <div class="ppm-field">
                        <label class="ppm-label">Usuario</label>
                        <input class="ppm-input" type="text" value={usuario}
                               oninput={handleUsuario} placeholder="Usuario maestro" />
                    </div>
                    <div class="ppm-field">
                        <label class="ppm-label">Contraseña</label>
                        <input class="ppm-input" type="password" value={contrasena}
                               oninput={handleContrasena} placeholder="Contraseña maestra" />
                    </div>

                    <template if:true={errorMsg}>
                        <div class="ppm-error">{errorMsg}</div>
                    </template>

                    <div class="ppm-actions">
                        <button class="ppm-btn-cancel" onclick={handleClose}>Cancelar</button>
                        <button class="ppm-btn-verify" onclick={handleVerify} disabled={isVerifying}>
                            {verifyBtnLabel}
                        </button>
                    </div>
                </template>

                <template if:true={revealed}>
                    <div class="ppm-revealed-wrap">
                        <div class="ppm-revealed-label">Contraseña del portal</div>
                        <div class="ppm-revealed-pass">{revealedPassword}</div>
                        <p class="ppm-revealed-note">
                            No compartas esta contraseña. Cierra este diálogo cuando termines.
                        </p>
                    </div>
                    <div class="ppm-actions">
                        <button class="ppm-btn-cancel" onclick={handleClose}>Cerrar</button>
                    </div>
                </template>

            </div>
        </div>
    </template>
</template>
