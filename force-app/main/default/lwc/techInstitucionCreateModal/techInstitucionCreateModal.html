<template>
    <template if:true={showModal}>
        <section class="icm-backdrop" onclick={handleBackdropClick}>
            <div class="icm-modal" onclick={handleModalClick}>

                <div class="icm-header">
                    <span class="icm-title">Nueva Institución</span>
                    <button class="icm-close" onclick={handleClose} title="Cerrar">
                        <lightning-icon icon-name="utility:close" size="small"
                                       alternative-text="Cerrar"></lightning-icon>
                    </button>
                </div>

                <lightning-record-edit-form object-api-name="Institucion__c"
                                           onsuccess={handleSuccess}
                                           onerror={handleError}>
                    <div class="icm-body">
                        <lightning-messages></lightning-messages>
                        <lightning-input-field field-name="Name"></lightning-input-field>
                        <lightning-input-field field-name="Tipo__c"></lightning-input-field>
                        <lightning-input-field field-name="Estatus__c"></lightning-input-field>
                        <lightning-input-field field-name="Pagina_Web__c"></lightning-input-field>
                        <lightning-input-field field-name="Email__c"></lightning-input-field>
                        <lightning-input-field field-name="Telefono__c"></lightning-input-field>
                    </div>
                    <div class="icm-footer">
                        <button class="icm-btn-cancel" type="button" onclick={handleClose}>Cancelar</button>
                        <button class="icm-btn-save" type="submit">Crear Institución</button>
                    </div>
                </lightning-record-edit-form>

            </div>
        </section>
    </template>
</template>
