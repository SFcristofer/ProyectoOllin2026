<template>
    <template if:true={showModal}>
        <div class="at-overlay" onclick={handleOverlayClick}></div>
        <div class="at-modal-panel">
            <div class="at-modal-header">
                <button class="at-modal-close" onclick={closeModal} title="Cerrar" aria-label="Cerrar">
                    <lightning-icon icon-name="utility:close" size="small" alternative-text="Cerrar"></lightning-icon>
                </button>
                <span class="at-modal-title">Nuevo Contratista</span>
                <span class="at-modal-object-badge">Account · Contratista</span>
            </div>
            <div class="at-modal-body">
                <template if:true={isLoading}>
                    <div class="at-modal-loading">
                        <lightning-spinner alternative-text="Guardando..." size="small"></lightning-spinner>
                    </div>
                </template>
                <lightning-record-edit-form object-api-name="Account" onsubmit={handleSubmit} onerror={handleError}>
                    <div class="at-modal-fields">
                        <div class="at-modal-field-row">
                            <div class="at-modal-field-label">
                                <lightning-icon icon-name="utility:text" size="xx-small" class="at-modal-field-icon"></lightning-icon>
                                <span>Nombre</span>
                            </div>
                            <div class="at-modal-field-input">
                                <lightning-input-field field-name="Name" variant="label-hidden" required></lightning-input-field>
                            </div>
                        </div>
                        <div class="at-modal-field-row">
                            <div class="at-modal-field-label">
                                <lightning-icon icon-name="utility:identity" size="xx-small" class="at-modal-field-icon"></lightning-icon>
                                <span>RFC</span>
                            </div>
                            <div class="at-modal-field-input">
                                <lightning-input-field field-name="RFC__c" variant="label-hidden"></lightning-input-field>
                            </div>
                        </div>
                        <div class="at-modal-field-row">
                            <div class="at-modal-field-label">
                                <lightning-icon icon-name="utility:call" size="xx-small" class="at-modal-field-icon"></lightning-icon>
                                <span>Teléfono</span>
                            </div>
                            <div class="at-modal-field-input">
                                <lightning-input-field field-name="Phone" variant="label-hidden"></lightning-input-field>
                            </div>
                        </div>
                        <div class="at-modal-field-row">
                            <div class="at-modal-field-label">
                                <lightning-icon icon-name="utility:email" size="xx-small" class="at-modal-field-icon"></lightning-icon>
                                <span>Email</span>
                            </div>
                            <div class="at-modal-field-input">
                                <lightning-input-field field-name="BillingStreet" variant="label-hidden"></lightning-input-field>
                            </div>
                        </div>
                        <div class="at-modal-field-row">
                            <div class="at-modal-field-label">
                                <lightning-icon icon-name="utility:location" size="xx-small" class="at-modal-field-icon"></lightning-icon>
                                <span>Ciudad</span>
                            </div>
                            <div class="at-modal-field-input">
                                <lightning-input-field field-name="BillingCity" variant="label-hidden"></lightning-input-field>
                            </div>
                        </div>
                        <div class="at-modal-field-row">
                            <div class="at-modal-field-label">
                                <lightning-icon icon-name="utility:location" size="xx-small" class="at-modal-field-icon"></lightning-icon>
                                <span>Estado</span>
                            </div>
                            <div class="at-modal-field-input">
                                <lightning-input-field field-name="BillingState" variant="label-hidden"></lightning-input-field>
                            </div>
                        </div>
                        <div class="at-modal-field-row">
                            <div class="at-modal-field-label">
                                <lightning-icon icon-name="utility:location" size="xx-small" class="at-modal-field-icon"></lightning-icon>
                                <span>País</span>
                            </div>
                            <div class="at-modal-field-input">
                                <lightning-input-field field-name="BillingCountry" variant="label-hidden"></lightning-input-field>
                            </div>
                        </div>
                        <div class="at-modal-field-row">
                            <div class="at-modal-field-label">
                                <lightning-icon icon-name="utility:link" size="xx-small" class="at-modal-field-icon"></lightning-icon>
                                <span>Sitio Web</span>
                            </div>
                            <div class="at-modal-field-input">
                                <lightning-input-field field-name="Website" variant="label-hidden"></lightning-input-field>
                            </div>
                        </div>
                    </div>
                    <div class="at-modal-footer">
                        <lightning-button label="Cancelar" onclick={closeModal} disabled={isLoading}></lightning-button>
                        <lightning-button type="submit" label="Guardar" variant="brand" disabled={isLoading}></lightning-button>
                    </div>
                </lightning-record-edit-form>
            </div>
        </div>
    </template>
</template>
