<template>
    <template if:true={showModal}>
        <div class="at-modal-overlay" onclick={handleOverlayClick}></div>
        <div class="at-modal-panel">

            <!-- Header -->
            <div class="at-modal-header">
                <div class="at-modal-header-left">
                    <lightning-icon icon-name="utility:contract" size="small" class="at-modal-obj-icon" alternative-text="Fianza"></lightning-icon>
                    <div>
                        <div class="at-modal-obj-label">Fianza</div>
                        <div class="at-modal-title">{modalTitle}</div>
                    </div>
                </div>
                <button class="at-modal-close" onclick={closeModal} title="Cerrar">
                    <lightning-icon icon-name="utility:close" size="small" alternative-text="Cerrar"></lightning-icon>
                </button>
            </div>

            <!-- Body -->
            <div class="at-modal-body">
                <template if:true={isLoading}>
                    <div class="at-modal-loading">
                        <lightning-spinner alternative-text="Guardando..." size="medium"></lightning-spinner>
                    </div>
                </template>

                <lightning-record-edit-form object-api-name="Fianza__c" record-id={editRecordId} onsubmit={handleSubmit}>
                    <div class="at-modal-fields">
                        <template for:each={fields} for:item="f">
                            <div key={f.apiName} class="at-modal-field-row">

                                <!-- Field label with type icon -->
                                <div class="at-modal-field-label">
                                    <lightning-icon
                                        icon-name={f.typeIcon}
                                        size="xx-small"
                                        class="at-modal-field-type-icon"
                                        alternative-text={f.typeLabel}>
                                    </lightning-icon>
                                    <span>{f.label}</span>
                                </div>

                                <!-- Field input area -->
                                <div class="at-modal-field-input">

                                    <!-- Contrato multi-lookup -->
                                    <template if:true={f.isContrato}>
                                        <c-tech-multi-lookup
                                            label={f.label}
                                            object-api-name="Contract"
                                            placeholder="Buscar contrato..."
                                            onselectionchange={handleContratoChange}
                                            oncreatenew={handleQuickCreate}>
                                        </c-tech-multi-lookup>
                                    </template>

                                    <!-- Endoso multi-lookup -->
                                    <template if:true={f.isEndoso}>
                                        <c-tech-multi-lookup
                                            label={f.label}
                                            object-api-name="Endoso__c"
                                            placeholder="Buscar endoso..."
                                            onselectionchange={handleEndosoChange}
                                            oncreatenew={handleQuickCreate}>
                                        </c-tech-multi-lookup>
                                    </template>

                                    <!-- Contratista multi-lookup -->
                                    <template if:true={f.isContratista}>
                                        <c-tech-multi-lookup
                                            label={f.label}
                                            object-api-name="Account"
                                            placeholder="Buscar contratista..."
                                            onselectionchange={handleContratistaChange}
                                            oncreatenew={handleQuickCreate}>
                                        </c-tech-multi-lookup>
                                    </template>

                                    <!-- Vendedor multi-lookup -->
                                    <template if:true={f.isVendedor}>
                                        <c-tech-multi-lookup
                                            label={f.label}
                                            object-api-name="Vendedores__c"
                                            placeholder="Buscar vendedor..."
                                            onselectionchange={handleVendedorChange}
                                            oncreatenew={handleQuickCreate}>
                                        </c-tech-multi-lookup>
                                    </template>

                                    <!-- Estatus: color badge preview -->
                                    <template if:true={f.isEstatusField}>
                                        <div class="at-estatus-wrapper">
                                            <lightning-input-field field-name={f.apiName} onchange={handleEstatusChange}></lightning-input-field>
                                            <template if:true={currentEstatusClass}>
                                                <span class={currentEstatusClass}>{currentEstatus}</span>
                                            </template>
                                        </div>
                                    </template>

                                    <!-- Standard field -->
                                    <template if:false={f.isSpecial}>
                                        <lightning-input-field field-name={f.apiName}></lightning-input-field>
                                    </template>

                                </div>
                            </div>
                        </template>
                    </div>

                    <!-- Footer actions -->
                    <div class="at-modal-footer">
                        <lightning-button
                            label="Cancelar"
                            onclick={closeModal}
                            disabled={isLoading}
                            class="slds-var-m-right_small">
                        </lightning-button>
                        <lightning-button
                            type="submit"
                            label="Guardar"
                            variant="brand"
                            icon-name="utility:save"
                            disabled={isLoading}>
                        </lightning-button>
                    </div>
                </lightning-record-edit-form>
            </div>

        </div>
    </template>
</template>
