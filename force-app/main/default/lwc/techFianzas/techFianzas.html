<template>
    <div class="airtable-container slds-bg-color_neutral-1">
        <!-- Barra de Herramientas -->
        <div class="airtable-toolbar slds-p-horizontal_medium slds-p-vertical_small slds-border_bottom slds-grid slds-grid_vertical-align-center">
            <div class="slds-col slds-size_1-of-2 slds-grid slds-grid_vertical-align-center">
                <lightning-button-menu label="Vistas" variant="border-filled" icon-name="utility:table" class="slds-m-right_small">
                    <lightning-menu-item value="grid" label="Cuadrícula"></lightning-menu-item>
                </lightning-button-menu>
                <lightning-button label="Filtrar" icon-name="utility:filterList" variant="border-all" class="slds-m-right_x-small"></lightning-button>
                <lightning-button label="Agrupar" icon-name="utility:groups" variant="border-all" class="slds-m-right_x-small"></lightning-button>
                <lightning-button label="Ordenar" icon-name="utility:sort" variant="border-all" class="slds-m-right_x-small"></lightning-button>
            </div>
            <div class="slds-col slds-size_1-of-2 slds-text-align_right">
                <lightning-input type="search" variant="label-hidden" placeholder="Buscar..." class="airtable-search-input slds-show_inline-block" onchange={handleSearch}></lightning-input>
                <lightning-button label="Nueva Fianza" variant="brand" icon-name="utility:add" class="slds-m-left_small" onclick={handleOpenCreateModal}></lightning-button>
            </div>
        </div>

        <!-- Tabla Estilo Airtable -->
        <div class="airtable-grid-container slds-p-around_medium">
            <template if:true={isLoading}>
                <div class="slds-p-around_large slds-text-align_center">
                    <lightning-spinner alternative-text="Cargando..." size="small"></lightning-spinner>
                </div>
            </template>

            <template if:true={fianzasFiltradas}>
                <table class="slds-table slds-table_bordered slds-table_col-bordered slds-no-row-hover airtable-table">
                    <thead>
                        <tr class="slds-line-height_reset">
                            <th scope="col" class="airtable-header-cell"><lightning-icon icon-name="utility:text" size="xx-small" class="slds-m-right_x-small"></lightning-icon>Folio</th>
                            <th scope="col" class="airtable-header-cell"><lightning-icon icon-name="utility:user" size="xx-small" class="slds-m-right_x-small"></lightning-icon>Contratista(s)</th>
                            <th scope="col" class="airtable-header-cell"><lightning-icon icon-name="utility:people" size="xx-small" class="slds-m-right_x-small"></lightning-icon>Vendedor(es)</th>
                            <th scope="col" class="airtable-header-cell"><lightning-icon icon-name="utility:money" size="xx-small" class="slds-m-right_x-small"></lightning-icon>Monto</th>
                            <th scope="col" class="airtable-header-cell"><lightning-icon icon-name="utility:record" size="xx-small" class="slds-m-right_x-small"></lightning-icon>Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={fianzasFiltradas} for:item="fianza">
                            <tr key={fianza.id}>
                                <td class="airtable-cell">{fianza.name}</td>
                                <!-- Chips para Contratistas -->
                                <td class="airtable-cell">
                                    <template for:each={fianza.contratistas} for:item="con">
                                        <span key={con} class="slds-badge slds-m-around_xx-small">{con}</span>
                                    </template>
                                </td>
                                <!-- Chips para Vendedores -->
                                <td class="airtable-cell">
                                    <template for:each={fianza.vendedores} for:item="ven">
                                        <span key={ven} class="slds-badge slds-m-around_xx-small">{ven}</span>
                                    </template>
                                </td>
                                <td class="airtable-cell">
                                    <lightning-formatted-number value={fianza.monto} format-style="currency" currency-code="MXN"></lightning-formatted-number>
                                </td>
                                <td class="airtable-cell">
                                    <span class={fianza.estatusClass}>{fianza.estatus}</span>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </template>
        </div>
    </div>

    <!-- Modal de Creación -->
    <c-tech-fianza-create-modal 
        show-modal={isCreateModalOpen}
        onclose={handleCloseCreateModal}
        onsuccess={handleCreateSuccess}>
    </c-tech-fianza-create-modal>
</template>
